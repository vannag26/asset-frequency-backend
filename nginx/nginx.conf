events { worker_connections 1024; }

http {
  # ── Rate limiting zones ──────────────────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
  limit_req_zone $binary_remote_addr zone=ws:10m  rate=10r/m;

  # ── Redirect HTTP → HTTPS ────────────────────────────────────────────────────
  server {
    listen 80;
    server_name api.theassetfrequency.com;
    return 301 https://$host$request_uri;
  }

  # ── Main HTTPS server ────────────────────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name api.theassetfrequency.com;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Security headers ───────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;

    # ── REST API proxy ─────────────────────────────────────────────────────────
    location /api/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass         http://api:4000;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
    }

    # ── Health check (public) ──────────────────────────────────────────────────
    location /health {
      proxy_pass http://api:4000/health;
    }

    # ── WebSocket proxy (real-time feed for paid subscribers) ─────────────────
    location /live {
      limit_req zone=ws burst=5 nodelay;
      proxy_pass         http://api:4000;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host       $host;
      proxy_read_timeout 3600s;   # Keep WS connections alive for 1 hour
      proxy_send_timeout 3600s;
    }
  }
}
