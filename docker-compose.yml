version: '3.9'

services:
  # ── Nginx reverse proxy + SSL termination ──────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: taf_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
    restart: unless-stopped

  # ── Main API (REST + WebSocket) ────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: taf_api
    environment:
      NODE_ENV: production
      PORT: 4000
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      ALPHA_VANTAGE_KEY: ${ALPHA_VANTAGE_KEY}
      POLYGON_API_KEY: ${POLYGON_API_KEY}
    depends_on:
      - redis
      - postgres
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Scheduler (daily jobs + real-time feed publisher) ─────────────────────
  scheduler:
    build:
      context: ./scheduler
      dockerfile: Dockerfile
    container_name: taf_scheduler
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      ALPHA_VANTAGE_KEY: ${ALPHA_VANTAGE_KEY}
      POLYGON_API_KEY: ${POLYGON_API_KEY}
      DAILY_UPDATE_CRON: "0 6 * * *"
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  # ── Redis (pub/sub broker for real-time events) ───────────────────────────
  redis:
    image: redis:7-alpine
    container_name: taf_redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── PostgreSQL (primary data store) ───────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: taf_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  nginx_logs:

networks:
  default:
    name: taf_network
